<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 音乐下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success { background: #d4edda; color: #155724; display: block; }
        .result.error { background: #f8d7da; color: #721c24; display: block; }
        .result.loading { background: #e7f3ff; color: #004085; display: block; }
        .song-info {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .song-info h3 { margin-bottom: 10px; color: #333; }
        .song-info p { color: #666; margin: 5px 0; }
        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }
        .download-link:hover { background: #218838; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .supported {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
        }
        .supported h4 { margin-bottom: 10px; color: #555; }
        .supported ul { list-style: none; padding-left: 0; }
        .supported li { padding: 5px 0; color: #666; }
        .supported li::before { content: "✓ "; color: #28a745; font-weight: bold; }
        .tips {
            margin-top: 15px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }
        .tips strong { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音乐下载器</h1>
        <p class="subtitle">支持酷狗音乐分享链接</p>
        
        <div class="input-group">
            <label for="url">粘贴音乐链接：</label>
            <input type="text" id="url" placeholder="https://m.kugou.com/share/song.html?chain=..." autocomplete="off">
        </div>
        
        <button class="btn" id="downloadBtn" onclick="startDownload()">开始下载</button>
        
        <div class="result" id="result"></div>
        
        <div class="tips">
            <strong>💡 使用提示</strong>
            如果下载按钮无法直接下载，请长按复制链接，然后在新标签页打开即可下载。
        </div>
        
        <div class="supported">
            <h4>支持的平台</h4>
            <ul>
                <li>酷狗音乐 (kugou.com)</li>
                <li>更多平台开发中...</li>
            </ul>
        </div>
    </div>

    <script>
        function extractChain(url) {
            const patterns = [/chain=([A-Za-z0-9]+)/, /\\/share\\/([A-Za-z0-9]+)\\.html/];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }
        
        function formatDuration(seconds) {
            try {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return mins + ":" + secs.toString().padStart(2, '0');
            } catch { return '未知'; }
        }
        
        function formatSize(bytes) {
            try {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
                return (bytes / (1024 * 1024)).toFixed(1) + " MB";
            } catch { return '未知'; }
        }
        
        function showError(msg) {
            const result = document.getElementById('result');
            result.className = 'result error';
            result.innerHTML = '<strong>✗ 错误</strong><br>' + msg;
        }
        
        function showSuccess(data) {
            const result = document.getElementById('result');
            result.className = 'result success';
            result.innerHTML = '<strong>✓ 解析成功！</strong>' +
                '<div class="song-info">' +
                '<h3>' + (data.songName || '未知歌曲') + '</h3>' +
                '<p>歌手：' + (data.artist || '未知') + '</p>' +
                '<p>时长：' + (data.duration || '未知') + '</p>' +
                '<p>大小：' + (data.size || '未知') + '</p>' +
                '</div>' +
                '<a href="' + data.downloadUrl + '" class="download-link" target="_blank">⬇️ 下载 MP3</a>';
        }
        
        async function fetchWithTimeout(url, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                return res;
            } catch (e) {
                clearTimeout(timeoutId);
                throw e;
            }
        }
        
        async function startDownload() {
            const url = document.getElementById('url').value.trim();
            const btn = document.getElementById('downloadBtn');
            const result = document.getElementById('result');
            
            if (!url) { showError('请输入音乐链接'); return; }
            if (!url.includes('kugou.com')) { showError('目前仅支持酷狗音乐链接'); return; }
            
            const chain = extractChain(url);
            if (!chain) { showError('无法解析链接，请检查链接格式'); return; }
            
            btn.disabled = true;
            result.className = 'result loading';
            result.innerHTML = '<span class="spinner"></span>正在解析链接...';
            
            try {
                const shareUrl = 'https://www.kugou.com/share/' + chain + '.html';
                
                // 使用多个 CORS 代理服务（GitHub Pages 纯静态方案）
                const proxies = [
                    { url: 'https://api.codetabs.com/v1/proxy?quest=', name: 'codetabs' },
                    { url: 'https://corsproxy.io/?', name: 'corsproxy' },
                    { url: 'https://api.allorigins.win/raw?url=', name: 'allorigins' }
                ];
                
                let html = null;
                let lastError = null;
                
                for (const proxy of proxies) {
                    try {
                        const res = await fetchWithTimeout(proxy.url + encodeURIComponent(shareUrl), 8000);
                        if (res.ok) {
                            html = await res.text();
                            console.log('Proxy succeeded:', proxy.name);
                            break;
                        }
                    } catch (e) {
                        lastError = e;
                        console.log('Proxy failed:', proxy.name, e.message);
                        continue;
                    }
                }
                
                if (!html) throw new Error('所有代理服务均不可用，请稍后重试或使用本地版本');
                
                // 提取 hash
                const hashMatch = html.match(/"hash":"([A-Fa-f0-9]+)"/);
                if (!hashMatch) throw new Error('无法获取歌曲信息，请检查链接是否有效');
                const hash = hashMatch[1];
                
                // 获取歌曲信息
                const apiUrl = 'https://m.kugou.com/app/i/getSongInfo.php?cmd=playInfo&hash=' + hash;
                
                let songInfo = null;
                for (const proxy of proxies) {
                    try {
                        const apiRes = await fetchWithTimeout(proxy.url + encodeURIComponent(apiUrl), 8000);
                        if (apiRes.ok) {
                            const text = await apiRes.text();
                            songInfo = JSON.parse(text);
                            console.log('API proxy succeeded:', proxy.name);
                            break;
                        }
                    } catch (e) {
                        console.log('API proxy failed:', proxy.name, e.message);
                        continue;
                    }
                }
                
                if (!songInfo) throw new Error('无法获取歌曲信息，请稍后重试');
                
                if (songInfo.status !== 1) throw new Error('歌曲不可用或需要付费');
                
                const downloadUrl = songInfo.url;
                if (!downloadUrl) throw new Error('无法获取下载链接');
                
                showSuccess({
                    songName: songInfo.audio_name || songInfo.songName,
                    artist: songInfo.author_name,
                    duration: formatDuration(songInfo.timeLength),
                    size: formatSize(songInfo.fileSize),
                    downloadUrl: downloadUrl
                });
            } catch (err) {
                console.error('Download error:', err);
                showError(err.message || '网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
            }
        }
        
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
